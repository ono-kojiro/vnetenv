---
ansible_host: router0
ansible_become: true
#ansible_become: false

sysconfdir: /usr/local/etc

sssd_ldap_uri: ldaps://192.168.1.72
sssd_ldap_suffix: dc=example,dc=com

sssd_ldap_tls_reqcert: never
sssd_allow_groups: ldapusers

sudo_admin_group: ldapusers

ifaces:  
- name: vtnet1
  value: "172.16.10.1/24"

- name: vtnet2
  value: "172.16.20.1/24"

- name: vtnet3
  value: "172.16.30.1/24"

dhcpd_conf: router0-dhcpd.conf
dhcpd_ifaces: "vtnet1 vtnet2 vtnet3"

named_conf: named.conf
named_dir: /usr/local/etc/namedb
named_listen_on: "127.0.0.1; 192.168.122.99; 172.16.10.1; 172.16.20.1; 172.16.30.1;" 

